<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/logos/LOGO-removebg-preview.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Crear Cuenta</title>
</head>

<body style="font-family: Arial; margin: 0; background: darkblue;">

    <main>

        <section style="background: white; width: 400px; margin: 50px auto; padding: 30px; text-align: center; border-radius: 12px;">

            <figure>
                <img src="https://cdn-icons-png.flaticon.com/512/747/747376.png" alt="logo" width="60">
            </figure>

            <h1 style="color: darkblue;">
                Crear Cuenta
            </h1>

            <p>
                Empieza a vender hoy mismo
            </p>

            <form action="admin.html" method="post"> 
 
                <label for="nombre">Nombre completo</label>
                <br><br>

                <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez"
                    style="width: 90%; padding: 10px;">

                <br><br>

                <label for="negocio">Nombre del negocio</label>
                <br><br>

                <input type="text" id="negocio" name="negocio" placeholder="Mi Boutique"
                    style="width: 90%; padding: 10px;">

                <br><br>

                <label for="correo">Correo electrónico</label>
                <br><br>

                <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com"
                    style="width: 90%; padding: 10px;">

                <br><br>

                <label for="password">Contraseña</label>
                <br><br>

                <input type="password" id="password" name="password" placeholder="••••••••"
                    style="width: 90%; padding: 10px;">

                <br><br>

                <label for="confirmar">Confirmar contraseña</label>
                <br><br>

                <input type="password" id="confirmar" name="confirmar" placeholder="••••••••"
                    style="width: 90%; padding: 10px;">

                <br><br>

                <button type="submit"
                    style="padding: 10px; background: darkblue; color: white; border: none; width: 95%;">

                    Crear Cuenta

                </button>

            </form>

            <hr style="margin-top: 30px;">

            <article>

                <label>¿Ya tienes cuenta?</label>

                <a href="login.html" style="color: darkblue;">
                    Inicia sesión
                </a>

            </article>

        </section>

    </main>

</body>

</html>
